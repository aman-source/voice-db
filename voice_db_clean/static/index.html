<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Voice Identification</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f7fb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px;
      margin: 0;
      box-sizing: border-box;
    }

    .container {
      background: #ffffff;
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin: 0 0 22px;
      color: #2d3748;
    }

    .section {
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 8px;
      background: #f9fafc;
      border: 1px solid #e5eaf2;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #4a5568;
    }

    .hint {
      font-size: 12px;
      color: #718096;
      margin-bottom: 10px;
      line-height: 1.7;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #cbd5e0;
      outline: none;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    input[type="text"]:focus { border-color: #7f9cf5; }

    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-bottom: 8px;
    }

    button:last-of-type { margin-bottom: 0; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-secondary { background: #5a7de0; color: #fff; }
    .btn-secondary:hover:not(:disabled) { background: #4a6dd0; }

    .btn-green { background: #68d391; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #5fc389; }

    .reg-counter {
      font-size: 12px;
      color: #718096;
      text-align: center;
      margin-top: 8px;
    }
    .reg-counter span { font-weight: 700; color: #7f9cf5; }

    .section-status {
      margin-top: 10px;
      font-size: 13px;
      color: #2d3748;
      min-height: 18px;
      text-align: center;
      line-height: 1.7;
    }

    .prompt-box {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 16px;
      background: #ebf4ff;
      border: 1px solid #bee3f8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #2b6cb0;
      letter-spacing: 0.01em;
    }

    .section-result {
      margin-top: 10px;
      font-size: 12.5px;
      background: #edf2f7;
      padding: 10px;
      border-radius: 6px;
      word-break: break-word;
      overflow-wrap: break-word;
      color: #2d3748;
      overflow: hidden;
      display: none;
    }

    .section-result.visible { display: block; }

    .section-result pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
      margin: 0;
      font-size: 12px;
      overflow-x: auto;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cbd5e0;
      border-top: 2px solid #7f9cf5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .matched    { color: #276749; font-weight: 700; }
    .notmatched { color: #c53030; font-weight: 700; }

    /* ── Verify Voice UX ───────────────────────────────── */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0    rgba(229, 62, 62, 0.45); }
      70%  { box-shadow: 0 0 0 12px rgba(229, 62, 62, 0);    }
      100% { box-shadow: 0 0 0 0    rgba(229, 62, 62, 0);    }
    }
    .btn-recording {
      background: #e53e3e !important;
      color: #fff !important;
      animation: pulse-ring 1.5s ease-in-out infinite;
    }

    .verify-hint {
      font-size: 12px;
      color: #718096;
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .verify-hint.show { opacity: 1; }

    .verify-steps { margin-top: 10px; }
    .verify-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 2px;
      font-size: 12.5px;
      color: #718096;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .verify-step.active { opacity: 1; transform: translateY(0); color: #4a5568; }
    .verify-step.done   { color: #276749; }
    .step-icon { width: 16px; text-align: center; font-size: 13px; display: inline-block; }
    .verify-step.active:not(.done) .step-icon { animation: spin 1.1s linear infinite; }

    .result-card {
      margin-top: 12px;
      padding: 14px;
      border-radius: 8px;
      font-size: 12.5px;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      display: none;
    }
    .result-card.visible { display: block; }
    .result-card.show    { opacity: 1; transform: translateY(0); }
    .result-matched     { background: #f0fff4; border: 1.5px solid #9ae6b4; }
    .result-not-matched { background: #fff5f5; border: 1.5px solid #feb2b2; }
    .result-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
      margin-bottom: 4px;
    }
    .result-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .details-toggle {
      font-size: 11px;
      color: #7f9cf5;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-top: 8px;
      text-decoration: underline;
      width: auto;
      margin-bottom: 0;
    }
    .details-json {
      display: none;
      margin-top: 8px;
      font-size: 11px;
      background: #edf2f7;
      padding: 8px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>Voice Matching System</h2>

  <!-- ── Register Section ─────────────────────────────── -->
  <div class="section">
    <div class="section-title">Register Voice</div>
    <div class="hint">
      Enter your name and click <b>Register (3 samples)</b>.<br>
    </div>
    <input type="text" id="reg-name" placeholder="Enter your name" />
    <button class="btn-secondary" id="reg-multi-btn" onclick="startRegisterMulti()">
      Register (3 samples — recommended)
    </button>
    <div class="reg-counter">Registered: <span id="reg-count">0</span> time(s)</div>
    <div class="section-status" id="reg-status"></div>
    <div class="section-result" id="reg-result"></div>
  </div>

  <!-- ── Verify Section ────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Verify Voice</div>
    <div class="hint">
      Speak any sentence clearly for <b>6 seconds</b> — your name,
      a transaction sentence, or anything else. The system will identify you.
    </div>
    <button class="btn-green" id="verify-btn" onclick="startVerify()">
      Verify Voice
    </button>
    <div class="verify-hint" id="verify-hint">Speak now — say anything clearly</div>
    <div class="verify-steps" id="verify-steps"></div>
    <div class="section-status" id="verify-status"></div>
    <div class="result-card" id="verify-result"></div>
  </div>
</div>

<script>
let regCount = 0;

const SENTENCE_POOL = [
  "I am making a payment right now",
  "Please transfer five hundred to the vendor",
  "The quick brown fox jumps over the lazy dog",
  "My voice is my unique identifier",
  "I authorize this financial transaction",
  "Send two thousand rupees to the account",
  "I confirm that I am the account holder",
  "Transfer one thousand to the recipient",
  "I want to complete this payment securely",
  "Please process my voice verification now",
  "I am speaking this sentence for registration",
  "Authenticate my voice for this transaction",
  "I need to send money to someone today",
  "Complete the transfer of five hundred",
  "I confirm this is my voice signature",
  "My account is linked to this voice",
  "I am the authorized user of this account",
  "Please verify my voice and proceed",
];

function pickTwo(pool) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return [shuffled[0], shuffled[1]];
}

async function recordAudio(durationMs) {
  const stream   = await navigator.mediaDevices.getUserMedia({ audio: true });
  const recorder = new MediaRecorder(stream);
  const chunks   = [];

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  return new Promise(resolve => {
    setTimeout(() => {
      recorder.stop();
      recorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const webmBlob = new Blob(chunks, { type: "audio/webm" });
        const wavBlob  = await webmToWav(webmBlob);
        resolve(wavBlob);
      };
    }, durationMs);
  });
}

async function webmToWav(webmBlob) {
  const ctx         = new AudioContext();
  const arrayBuffer = await webmBlob.arrayBuffer();
  const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
  return new Blob([audioBufferToWav(audioBuffer)], { type: "audio/wav" });
}

function audioBufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate  = buffer.sampleRate;
  const length      = buffer.length * numChannels * 2;
  const wav         = new ArrayBuffer(44 + length);
  const view        = new DataView(wav);
  let offset = 0;

  const writeString = s => { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); };

  writeString("RIFF");
  view.setUint32(offset, 36 + length, true); offset += 4;
  writeString("WAVEfmt ");
  view.setUint32(offset, 16,           true); offset += 4;
  view.setUint16(offset, 1,            true); offset += 2;
  view.setUint16(offset, numChannels,  true); offset += 2;
  view.setUint32(offset, sampleRate,   true); offset += 4;
  view.setUint32(offset, sampleRate * numChannels * 2, true); offset += 4;
  view.setUint16(offset, numChannels * 2, true); offset += 2;
  view.setUint16(offset, 16,           true); offset += 2;
  writeString("data");
  view.setUint32(offset, length, true); offset += 4;

  for (let ch = 0; ch < numChannels; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = 0; i < data.length; i++) {
      const s = Math.max(-1, Math.min(1, data[i]));
      view.setInt16(offset, s * 0x7fff, true);
      offset += 2;
    }
  }
  return wav;
}

async function startRegisterMulti() {
  const name = document.getElementById("reg-name").value.trim();
  if (!name) return alert("Enter your name first.");

  setButtons(true);
  clearResult("reg-result");

  const [sent1, sent2] = pickTwo(SENTENCE_POOL);

  const steps = [
    { label: "Sample 1 of 3", prompt: `Say your name ${name.toUpperCase()} 3 to 4 times`, ms: 5000 },
    { label: "Sample 2 of 3", prompt: sent1, ms: 6000 },
    { label: "Sample 3 of 3", prompt: sent2, ms: 6000 },
  ];

  const blobs = [];

  for (let i = 0; i < steps.length; i++) {
    const step = steps[i];
    setStatus("reg-status",
      `<b>${step.label}</b> — Recording (${step.ms / 1000} sec)<br>` +
      `<span class="prompt-box">${step.prompt}</span>`
    );
    const blob = await recordAudio(step.ms);
    blobs.push(blob);

    if (i < steps.length - 1) {
      setStatus("reg-status", `${step.label} done ✓ &nbsp; Get ready for the next sample...`);
      await new Promise(r => setTimeout(r, 2000));
    }
  }

  setStatus("reg-status", '<span class="loading"></span> Uploading 3 samples...');

  const form = new FormData();
  form.append("person_name", name);
  form.append("audio1", blobs[0], "voice1.wav");
  form.append("audio2", blobs[1], "voice2.wav");
  form.append("audio3", blobs[2], "voice3.wav");

  try {
    const res  = await fetch("/voice/register-multi", { method: "POST", body: form });
    const data = await res.json();
    regCount++;
    document.getElementById("reg-count").textContent = regCount;
    setStatus("reg-status", "");
    showResult("reg-result", `Registered "${name}" with 3 samples\n\n` + JSON.stringify(data, null, 2));
  } catch (err) {
    setStatus("reg-status", "");
    showResult("reg-result", "Error: " + err.message);
  } finally {
    setButtons(false);
  }
}

async function startVerify() {
  const btn      = document.getElementById("verify-btn");
  const hint     = document.getElementById("verify-hint");
  const stepsEl  = document.getElementById("verify-steps");
  const resultEl = document.getElementById("verify-result");

  // ── Phase 1: Recording — optimistic, instant feedback ──
  btn.classList.remove("btn-green");
  btn.classList.add("btn-recording");
  btn.disabled = true;
  document.getElementById("reg-multi-btn").disabled = true;

  resultEl.classList.remove("visible", "show", "result-matched", "result-not-matched");
  resultEl.innerHTML = "";
  stepsEl.innerHTML  = "";
  setStatus("verify-status", "");

  hint.classList.add("show");

  let remaining = 6;
  btn.textContent = `🔴 Recording... ${remaining}s`;
  const ticker = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      btn.textContent = `🔴 Recording... ${remaining}s`;
    } else {
      clearInterval(ticker);
      btn.textContent = "Analyzing...";
    }
  }, 1000);

  const audioBlob = await recordAudio(6000);
  clearInterval(ticker);

  // ── Phase 2: Processing — animated step labels ──
  hint.classList.remove("show");
  btn.textContent = "Analyzing...";

  const STEPS = [
    { label: "Identifying speaker", delay: 0    },
    { label: "Transcribing speech", delay: 1500 },
    { label: "Checking database",   delay: 3000 },
  ];

  STEPS.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "verify-step";
    div.id = `vstep-${i}`;
    div.innerHTML = `<span class="step-icon">⟳</span><span>${s.label}…</span>`;
    stepsEl.appendChild(div);
  });

  const stepTimers = STEPS.map((s, i) =>
    setTimeout(() => {
      const el = document.getElementById(`vstep-${i}`);
      if (el) el.classList.add("active");
    }, s.delay)
  );

  const form = new FormData();
  form.append("audio", audioBlob, "voice.wav");

  try {
    const res  = await fetch("/voice/verify-transaction", { method: "POST", body: form });
    const data = await res.json();

    // Stop scheduled activations, force-show any not yet visible
    stepTimers.forEach(t => clearTimeout(t));
    STEPS.forEach((_, i) => {
      const el = document.getElementById(`vstep-${i}`);
      if (el) el.classList.add("active");
    });

    // Flash ✓ on each step sequentially — fast, satisfying
    for (let i = 0; i < STEPS.length; i++) {
      await new Promise(r => setTimeout(r, 120));
      const el = document.getElementById(`vstep-${i}`);
      if (el) {
        el.classList.add("done");
        el.querySelector(".step-icon").textContent = "✓";
      }
    }

    // Brief pause so user sees all ✓ before result appears
    await new Promise(r => setTimeout(r, 350));

    // Fade out steps
    stepsEl.style.opacity = "0";
    stepsEl.style.transition = "opacity 0.25s ease";
    await new Promise(r => setTimeout(r, 280));
    stepsEl.innerHTML = "";
    stepsEl.style.opacity = "";
    stepsEl.style.transition = "";

    // ── Phase 3: Result card ──
    const isMatched    = data.voice_status === "MATCHED";
    const senderLine   = buildNameLine("Sender",   data.sender);
    const receiverLine = buildNameLine("Receiver", data.receiver);

    resultEl.className = "result-card visible " +
      (isMatched ? "result-matched" : "result-not-matched");

    resultEl.innerHTML = `
      <div class="result-label">Voice Verification</div>
      <div class="result-status-badge">
        ${isMatched ? "✅" : "❌"}
        <span class="${isMatched ? "matched" : "notmatched"}">
          ${isMatched ? "MATCHED" : data.voice_status}
        </span>
        &nbsp;—&nbsp;<span style="font-weight:400">"${data.speaker || "unknown"}"</span>
      </div>
      ${senderLine}${receiverLine}
      ${data.amount     ? `<div><b>Amount:</b> ${data.amount}</div>` : ""}
      ${data.transcript ? `<div><b>Transcript:</b> ${data.transcript}</div>` : ""}
      <button class="details-toggle" onclick="toggleDetails(this)">Show details ▾</button>
      <pre class="details-json">${JSON.stringify(data, null, 2)}</pre>
    `;

    // Double rAF ensures display:block has painted before opacity transition fires
    requestAnimationFrame(() => {
      requestAnimationFrame(() => resultEl.classList.add("show"));
    });

  } catch (err) {
    stepTimers.forEach(t => clearTimeout(t));
    stepsEl.innerHTML = "";
    setStatus("verify-status", "Error: " + err.message);
  } finally {
    btn.classList.remove("btn-recording");
    btn.classList.add("btn-green");
    btn.textContent = "Verify Voice";
    setButtons(false);
  }
}

function toggleDetails(btn) {
  const pre  = btn.nextElementSibling;
  const open = pre.style.display === "block";
  pre.style.display = open ? "none" : "block";
  btn.textContent   = open ? "Show details ▾" : "Hide details ▴";
}

function buildNameLine(label, obj) {
  if (!obj || !obj.spoken_as) return "";
  const status = obj.db_status === "found"
    ? `<span style="color:#276749;font-weight:700">found in DB ✓</span>`
    : `<span style="color:#c53030;font-weight:700">not found in DB ✗</span>`;
  const display = obj.name || obj.spoken_as;
  return `<b>${label}:</b> "${display}" — ${status}<br>`;
}

function setStatus(id, html) {
  document.getElementById(id).innerHTML = html;
}

function showResult(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.add("visible");
}

function clearResult(id) {
  const el = document.getElementById(id);
  el.innerHTML = "";
  el.classList.remove("visible");
}

function setButtons(disabled) {
  document.getElementById("reg-multi-btn").disabled = disabled;
  document.getElementById("verify-btn").disabled    = disabled;
}
</script>
</body>
</html>
